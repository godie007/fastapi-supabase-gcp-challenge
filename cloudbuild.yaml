# CI/CD (challenge): tests → Docker image → Artifact Registry → Cloud Run.
# Running tests before build avoids shipping broken artifacts.
# Cloud Run DATABASE_URL is injected from Secret Manager (no URI in substitutions).
substitutions:
  _REGION: us-central1
  _SERVICE_NAME: fastapi-users-api
  _AR_REPOSITORY: app-images
  _IMAGE_NAME: fastapi-users-api

steps:
  - id: install-and-test
    name: python:3.12-slim
    env:
      - 'DATABASE_URL=sqlite://'
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        pip install --no-cache-dir -r requirements.txt
        pytest app/tests -v

  - id: build-image
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPOSITORY}/${_IMAGE_NAME}:${SHORT_SHA}'
      - '.'

  - id: push-image
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPOSITORY}/${_IMAGE_NAME}:${SHORT_SHA}'

  - id: deploy-cloud-run
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        gcloud run deploy '${_SERVICE_NAME}' \
          --image '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPOSITORY}/${_IMAGE_NAME}:${SHORT_SHA}' \
          --region '${_REGION}' \
          --platform managed \
          --allow-unauthenticated \
          --set-secrets=DATABASE_URL=fastapi-supabase-gcp-challenge:latest

options:
  logging: CLOUD_LOGGING_ONLY
