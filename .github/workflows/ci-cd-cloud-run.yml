# Tests run first on every push / pull_request.
# Deploy runs only after tests pass on branch `main` (push or workflow_dispatch).
#
# Repository secrets or variables:
#   GCP_PROJECT_ID, GCP_WORKLOAD_IDENTITY_PROVIDER
# Optional repository variables:
#   GCP_REGION - Cloud Run region (default: us-central1)
#   GCP_SERVICE_NAME - Cloud Run service name (default: fastapi-users-api)
#
# Auth: direct Workload Identity Federation.
# Fork PRs do not receive secrets; deploy only runs on main.

name: CI/CD — Tests then Cloud Run

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Run pytest
        env:
          DATABASE_URL: sqlite://
        run: pytest app/tests -v

  deploy:
    name: Build & Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: test
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v4

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER || vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          project_id: ${{ secrets.GCP_PROJECT_ID || vars.GCP_PROJECT_ID }}
          export_environment_variables: true
          access_token_lifetime: 3600s
          access_token_scopes: https://www.googleapis.com/auth/cloud-platform

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: us-central1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ env.GCP_ACCESS_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID || vars.GCP_PROJECT_ID }}/app-images/fastapi-users-api:${{ github.sha }}

      - name: Deploy to Cloud Run
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID || vars.GCP_PROJECT_ID }}
          REGION: ${{ vars.GCP_REGION || 'us-central1' }}
          SERVICE_NAME: ${{ vars.GCP_SERVICE_NAME || 'fastapi-users-api' }}
          IMAGE: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID || vars.GCP_PROJECT_ID }}/app-images/fastapi-users-api:${{ github.sha }}
        run: |
          gcloud run deploy "${SERVICE_NAME}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --platform=managed \
            --image="${IMAGE}" \
            --port=8080 \
            --memory=512Mi \
            --cpu=1 \
            --timeout=300 \
            --max-instances=10 \
            --min-instances=0 \
            --concurrency=80 \
            --allow-unauthenticated