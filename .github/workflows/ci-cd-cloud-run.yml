# Tests run first on every push / pull_request.
# Deploy runs only after tests pass on branch `main` (push or workflow_dispatch).
#
# Repository secrets or variables:
#   GCP_PROJECT_ID, GCP_WORKLOAD_IDENTITY_PROVIDER, GCP_WIF_SERVICE_ACCOUNT (deploy SA email)
#
# Auth: WIF → impersonate github-actions-deploy@… (see scripts/setup-github-actions-wif.sh).
# Fork PRs do not receive secrets; deploy only runs on main.

name: CI/CD — Tests then Cloud Run

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Run pytest
        env:
          DATABASE_URL: sqlite://
        run: pytest app/tests -v

  deploy:
    name: Deploy via Cloud Build → Cloud Run
    runs-on: ubuntu-latest
    needs: test
    # Only deploy after tests succeed on main (push or manual workflow).
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Workload Identity Federation + SA impersonation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER || vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT || vars.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID || vars.GCP_PROJECT_ID }}

      - name: Submit Cloud Build (runs tests again, then image + Cloud Run deploy)
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID || vars.GCP_PROJECT_ID }}
        run: |
          set -euo pipefail
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          gcloud builds submit \
            --project="${PROJECT_ID}" \
            --config=cloudbuild.yaml \
            --substitutions="SHORT_SHA=${SHORT_SHA}"
