# Tests run first on every push / pull_request.
# Deploy runs only after tests pass on branch `main` (push or workflow_dispatch).
#
# Repository secrets or variables:
#   GCP_PROJECT_ID, GCP_WORKLOAD_IDENTITY_PROVIDER
# Optional repository variables (recommended if `gcloud builds submit` hits *_cloudbuild forbidden):
#   GCP_CLOUD_BUILD_TRIGGER — trigger ID or name (Cloud Build fetches repo source; no staging bucket upload).
#   GCP_CLOUD_BUILD_REGION — e.g. us-central1 if your trigger is regional (2nd gen).
#
# Auth: direct Workload Identity Federation (no service account impersonation). That avoids
# iam.serviceAccounts.getAccessToken, which remains denied for some org/pool/SA IAM setups.
# Grant Cloud Build + Service Usage (+ Storage bucket IAM if using `gcloud builds submit`) via setup-github-actions-wif.sh.
# Fork PRs do not receive secrets; deploy only runs on main.

name: CI/CD — Tests then Cloud Run

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Run pytest
        env:
          DATABASE_URL: sqlite://
        run: pytest app/tests -v

  deploy:
    name: Deploy via Cloud Build → Cloud Run
    runs-on: ubuntu-latest
    needs: test
    # Only deploy after tests succeed on main (push or manual workflow).
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v4

      - id: auth
        name: Authenticate to Google Cloud (direct Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER || vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          project_id: ${{ secrets.GCP_PROJECT_ID || vars.GCP_PROJECT_ID }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID || vars.GCP_PROJECT_ID }}

      - name: Run Cloud Build → Cloud Run
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID || vars.GCP_PROJECT_ID }}
          CLOUD_BUILD_TRIGGER: ${{ vars.GCP_CLOUD_BUILD_TRIGGER }}
          CLOUD_BUILD_REGION: ${{ vars.GCP_CLOUD_BUILD_REGION }}
        run: |
          set -euo pipefail
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          REGION_ARGS=()
          if [[ -n "${CLOUD_BUILD_REGION:-}" ]]; then
            REGION_ARGS=(--region="${CLOUD_BUILD_REGION}")
          fi
          if [[ -n "${CLOUD_BUILD_TRIGGER:-}" ]]; then
            echo "Running Cloud Build trigger \"${CLOUD_BUILD_TRIGGER}\" (source from GitHub; skips Actions tarball upload)"
            gcloud builds triggers run "${CLOUD_BUILD_TRIGGER}" \
              "${REGION_ARGS[@]}" \
              --project="${PROJECT_ID}" \
              --branch="${GITHUB_REF_NAME}" \
              --substitutions="SHORT_SHA=${SHORT_SHA}"
          else
            echo "Running gcloud builds submit"
            if [[ -n "${GCP_WIF_SERVICE_ACCOUNT:-}" ]]; then
              gcloud builds submit \
                --project="${PROJECT_ID}" \
                --config=cloudbuild.yaml \
                --substitutions="SHORT_SHA=${SHORT_SHA}" \
                --impersonate-service-account="${GCP_WIF_SERVICE_ACCOUNT}"
            else
              gcloud builds submit \
                --project="${PROJECT_ID}" \
                --config=cloudbuild.yaml \
                --substitutions="SHORT_SHA=${SHORT_SHA}"
            fi
          fi
