# CI/CD: pytest (SQLite + Postgres integration) → Docker (linux/amd64) → Artifact Registry → Cloud Run.
# DATABASE_URL for runtime is mounted from Secret Manager (secret name via _DATABASE_SECRET).
#
# Image tag: SHORT_SHA when set (e.g. GitHub trigger); otherwise BUILD_ID (manual `gcloud builds submit`).
substitutions:
  _REGION: us-central1
  _SERVICE_NAME: fastapi-users-api
  _AR_REPOSITORY: app-images
  _IMAGE_NAME: fastapi-users-api
  _DATABASE_SECRET: fastapi-supabase-gcp-challenge
  _MEMORY: 512Mi
  _CPU: "1"
  _CLOUD_RUN_TIMEOUT: "300"
  _MAX_INSTANCES: "10"

timeout: 1200s

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - id: install-and-test
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        trap 'docker rm -f ci-postgres >/dev/null 2>&1 || true' EXIT
        docker rm -f ci-postgres >/dev/null 2>&1 || true
        docker run -d --name ci-postgres \
          -e POSTGRES_USER=test \
          -e POSTGRES_PASSWORD=test \
          -e POSTGRES_DB=app_integration_test \
          -p 5432:5432 \
          postgres:16-alpine
        for _ in $$(seq 1 90); do
          if docker exec ci-postgres pg_isready -U test -d app_integration_test >/dev/null 2>&1; then break; fi
          sleep 1
        done
        docker exec ci-postgres pg_isready -U test -d app_integration_test
        docker run --rm --network host \
          -v /workspace:/workspace \
          -w /workspace \
          -e DATABASE_URL=sqlite:// \
          -e INTEGRATION_DATABASE_URL=postgresql+psycopg2://test:test@127.0.0.1:5432/app_integration_test \
          python:3.12-slim \
          bash -c 'pip install --no-cache-dir -r requirements.txt && pytest -v --tb=short'
        STATUS=$$?
        exit $$STATUS

  - id: build-image
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        TAG='${SHORT_SHA}'
        if [ -z "$${TAG}" ]; then TAG='${BUILD_ID}'; fi
        URI="${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPOSITORY}/${_IMAGE_NAME}:$${TAG}"
        echo "Building image: $${URI}"
        echo -n "$${URI}" > /workspace/ci_image_uri.txt
        docker build --platform linux/amd64 -t "$${URI}" .

  - id: push-image
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        docker push "$(cat /workspace/ci_image_uri.txt)"

  - id: deploy-cloud-run
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        IMG="$(cat /workspace/ci_image_uri.txt)"
        gcloud run deploy '${_SERVICE_NAME}' \
          --project='${PROJECT_ID}' \
          --region='${_REGION}' \
          --platform=managed \
          --image="$${IMG}" \
          --port=8080 \
          --memory='${_MEMORY}' \
          --cpu='${_CPU}' \
          --timeout='${_CLOUD_RUN_TIMEOUT}' \
          --max-instances='${_MAX_INSTANCES}' \
          --min-instances=0 \
          --concurrency=80 \
          --allow-unauthenticated \
          --set-secrets=DATABASE_URL=${_DATABASE_SECRET}:latest \
          --quiet
